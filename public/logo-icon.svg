<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="logoGradientIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <filter id="glowIcon">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Circular Background -->
  <circle cx="30" cy="30" r="28" fill="#1a1a2e"/>
  
  <!-- Zap Icon -->
  <g transform="translate(12, 12)" filter="url(#glowIcon)">
    <path d="M20 0 L0 20 L12 20 L8 40 L28 16 L16 16 Z" fill="url(#logoGradientIcon)"/>
  </g>
</svg>
