<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <defs>
    <linearGradient id="logoGradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="400" height="80" fill="transparent"/>
  
  <g transform="translate(10, 15)" filter="url(#glow1)">
    <path d="M25 0 L0 25 L15 25 L10 50 L35 20 L20 20 Z" fill="url(#logoGradient1)"/>
  </g>
  
  <text x="60" y="52" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800" fill="white">
    WP
  </text>
  
  <text x="115" y="52" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="700" fill="url(#logoGradient1)">
    CodingPress
  </text>
</svg>
